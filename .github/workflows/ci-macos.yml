name: macOS

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macOS / AppleClang
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgGitCommitId: '66c0373dc7fca549e5803087b9487edfe3aca0a1'

      - name: Configure
        run: cmake --preset vcpkg-debug

      - name: Build
        run: cmake --build build/debug --parallel

      - name: Test
        run: ctest --test-dir build/debug --output-on-failure
