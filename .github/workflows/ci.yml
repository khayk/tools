name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux / GCC"
            os: ubuntu-24.04
            preset: vcpkg-debug
            build-dir: build/debug

          - name: "macOS / AppleClang"
            os: macos-latest
            preset: vcpkg-debug
            build-dir: build/debug

          - name: "Windows / MSVC"
            os: windows-2022
            preset: vcpkg-msvc-debug
            build-dir: build/msvc-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '66c0373dc7fca549e5803087b9487edfe3aca0a1'

      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
        shell: pwsh

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build ${{ matrix.build-dir }} --parallel

      - name: Test
        run: ctest --test-dir ${{ matrix.build-dir }} --output-on-failure

  coverage:
    name: "Coverage"
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 60
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build pkg-config lcov

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '66c0373dc7fca549e5803087b9487edfe3aca0a1'

      - name: Configure
        run: cmake --preset vcpkg-coverage

      - name: Build
        run: cmake --build --preset vcpkg-coverage

      - name: Generate reports
        run: |
          cmake --build --preset vcpkg-coverage -t coverage-core-test
          cmake --build --preset vcpkg-coverage -t coverage-duplicates-test
          cmake --build --preset vcpkg-coverage -t coverage-kidmon-test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: build/coverage/coverage-*/
          retention-days: 14

      - name: Upload to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/coverage

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
