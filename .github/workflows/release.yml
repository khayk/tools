name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x64
            configure_preset: vcpkg-release
            build_dir: build/release
          - os: macos-latest
            name: macos-arm64
            configure_preset: vcpkg-release
            build_dir: build/release
          - os: windows-2022
            name: windows-x64
            configure_preset: vcpkg-msvc-release
            build_dir: build/msvc-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build pkg-config

      - name: Enable long paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgGitCommitId: '66c0373dc7fca549e5803087b9487edfe3aca0a1'

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel

      - name: Install
        run: cmake --install ${{ matrix.build_dir }} --prefix staging

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar czf tools-${{ github.ref_name }}-${{ matrix.name }}.tar.gz -C staging/bin .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging/bin/* `
            -DestinationPath "tools-${{ github.ref_name }}-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tools-${{ github.ref_name }}-${{ matrix.name }}
          path: tools-${{ github.ref_name }}-${{ matrix.name }}.*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
